##############################################################################
# codemagic.yaml — US Outdoor Navigator
# iOS App Store + Android Play Store CI/CD
#
# KURULUM:
#   1. codemagic.io → GitHub repo'nu bağla
#   2. Environment Variables ekle (aşağıda):
#      - RC_KEY_ANDROID  → RevenueCat Android Public Key
#      - RC_KEY_IOS      → RevenueCat iOS Public Key
#      - APP_STORE_CONNECT_KEY_IDENTIFIER → App Store Connect API Key ID
#      - APP_STORE_CONNECT_ISSUER_ID      → App Store Connect Issuer ID
#      - APP_STORE_CONNECT_PRIVATE_KEY    → App Store Connect .p8 key (base64)
#      - KEYSTORE_BASE64                  → android/app/usoutdoor-release.jks (base64)
#      - CM_KEYSTORE_PASSWORD             → usoutdoor2026
#      - CM_KEY_ALIAS                     → usoutdoor
#      - CM_KEY_PASSWORD                  → usoutdoor2026
##############################################################################

workflows:

  # ─────────────────────────────────────────────────────────────────────────
  # iOS — App Store Build & Upload
  # ─────────────────────────────────────────────────────────────────────────
  ios-app-store:
    name: iOS App Store Release
    max_build_duration: 90
    instance_type: mac_mini_m2

    # integrations bloku YOK — env var tabanlı auth kullanıyoruz
    # Codemagic → Team → Global Variables grubuna ekle:
    #   APP_STORE_CONNECT_KEY_IDENTIFIER  → API Key ID (örn: ABCD1234EF)
    #   APP_STORE_CONNECT_ISSUER_ID       → Issuer ID (UUID)
    #   APP_STORE_CONNECT_PRIVATE_KEY     → .p8 dosyasının içeriği (tüm metin)

    environment:
      # Grup YOK — değişkenleri Codemagic → App → Environment variables
      # (veya Team → Global variables) kısmına tek tek ekle:
      #   APP_STORE_CONNECT_PRIVATE_KEY    → .p8 dosyasının tam içeriği
      #   APP_STORE_CONNECT_KEY_IDENTIFIER → API Key ID
      #   APP_STORE_CONNECT_ISSUER_ID      → Issuer ID (UUID)
      #   RC_KEY_IOS                       → RevenueCat iOS key
      vars:
        BUNDLE_ID: "com.mert.usoutdoor"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
        API_URL: "https://us-outdoor-api-production.up.railway.app"
      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "v*"
          include: true

    scripts:
      - name: Set up code signing
        script: |
          # API key'i açıkça geç (env var auto-detection güvenilir değil)
          keychain initialize
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID"
          keychain add-certificates
          xcode-project use-profiles

      - name: Flutter pub get
        script: |
          cd frontend
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd frontend/ios
          pod install --repo-update

      - name: Flutter build IPA
        script: |
          # flutter build ipa = build + sign + package (tek adımda)
          cd frontend
          flutter build ipa --release \
            --dart-define=API_URL=$API_URL \
            --dart-define=RC_KEY_IOS=$RC_KEY_IOS \
            --export-options-plist=ios/ExportOptions.plist

    artifacts:
      - frontend/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        # Env var tabanlı auth — Codemagic dashboard integration GEREKMEZ
        # app_store_credentials grubunda şu 3 değişken olmalı:
        #   APP_STORE_CONNECT_PRIVATE_KEY      → .p8 dosyasının tam içeriği
        #   APP_STORE_CONNECT_KEY_IDENTIFIER   → API Key ID (örn: ABCD1234EF)
        #   APP_STORE_CONNECT_ISSUER_ID        → Issuer ID (UUID)
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        # submit_to_app_store: false (default — TestFlight only)

      email:
        recipients:
          - mert.neck@gmail.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────────────────────────────────
  # Android — Direct APK (Google Play kimlik incelemesi için manuel teslim)
  # Tetikleme: codemagic.io → Workflow → android-release-apk → Start build
  # Artifact: frontend/build/app/outputs/flutter-apk/app-release.apk
  # ─────────────────────────────────────────────────────────────────────────
  android-release-apk:
    name: Android Release APK — Direct Download
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      # Codemagic → App → Environment variables kısmına ekle (secure):
      #   RC_KEY_ANDROID               → RevenueCat Android key
      #   KEYSTORE_BASE64              → keystore dosyasının base64'ü
      #   CM_KEYSTORE_PASSWORD         → usoutdoor2026
      #   CM_KEY_ALIAS                 → usoutdoor
      #   CM_KEY_PASSWORD              → usoutdoor2026
      vars:
        PACKAGE_NAME: "com.mert.usoutdoor"
        API_URL: "https://us-outdoor-api-production.up.railway.app"
      flutter: stable

    # Manuel tetikleme — etiket veya otomatik trigger YOK
    # Codemagic dashboard'dan "Start build" ile çalıştır.

    scripts:
      - name: Set up keystore
        script: |
          echo $KEYSTORE_BASE64 | base64 --decode > frontend/android/app/usoutdoor-release.jks
          cat >> frontend/android/key.properties << EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=usoutdoor-release.jks
          EOF

      - name: Flutter pub get
        script: |
          cd frontend
          flutter pub get

      - name: Flutter build APK (release — signed)
        script: |
          cd frontend
          flutter build apk --release \
            --dart-define=API_URL=$API_URL \
            --dart-define=RC_KEY_ANDROID=$RC_KEY_ANDROID \
            --shrink \
            --obfuscate \
            --split-debug-info=build/debug-info

    artifacts:
      # ← Mert'e teslim edilecek dosya buradan indirilir
      - frontend/build/app/outputs/flutter-apk/app-release.apk
      - frontend/build/app/outputs/mapping/release/mapping.txt
      - frontend/build/debug-info/**

    publishing:
      email:
        recipients:
          - mert.neck@gmail.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────────────────────────────────
  # Android — Play Store Build & Upload
  # ─────────────────────────────────────────────────────────────────────────
  android-play-store:
    name: Android Play Store Release
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      # Grup YOK — değişkenleri Codemagic → App → Environment variables
      # kısmına tek tek ekle (secure işaretli):
      #   RC_KEY_ANDROID               → RevenueCat Android key
      #   KEYSTORE_BASE64              → keystore dosyasının base64'ü
      #   CM_KEYSTORE_PASSWORD         → usoutdoor2026
      #   CM_KEY_ALIAS                 → usoutdoor
      #   CM_KEY_PASSWORD              → usoutdoor2026
      #   GCLOUD_SERVICE_ACCOUNT_CREDENTIALS → Play Console JSON key
      vars:
        PACKAGE_NAME: "com.mert.usoutdoor"
        API_URL: "https://us-outdoor-api-production.up.railway.app"
      flutter: stable

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "v*"
          include: true

    scripts:
      - name: Set up keystore
        script: |
          echo $KEYSTORE_BASE64 | base64 --decode > frontend/android/app/usoutdoor-release.jks
          cat >> frontend/android/key.properties << EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=usoutdoor-release.jks
          EOF

      - name: Flutter pub get
        script: |
          cd frontend
          flutter pub get

      - name: Flutter build AAB
        script: |
          cd frontend
          flutter build appbundle --release \
            --dart-define=API_URL=$API_URL \
            --dart-define=RC_KEY_ANDROID=$RC_KEY_ANDROID

    artifacts:
      - frontend/build/app/outputs/bundle/release/app-release.aab
      - frontend/build/app/outputs/mapping/release/mapping.txt

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal          # internal → alpha → beta → production
        submit_as_draft: false

      email:
        recipients:
          - mert.neck@gmail.com
        notify:
          success: true
          failure: true
